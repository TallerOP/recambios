<!DOCTYPE html>
<html>
<head>
  <title>Escáner Inventario + Dashboard</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; margin:20px; }
    #reader { width:100%; max-width:400px; margin:auto; }
    #resultado, #dashboard { margin-top:20px; }
    table, th, td { border:1px solid #ccc; border-collapse:collapse; padding:5px; }
  </style>
</head>
<body>
<h2>Escanear código de recambio</h2>
<div id="reader"></div>

<div id="formulario" style="display:none">
  Tipo: <select id="tipo"><option value="entrada">Entrada</option><option value="salida">Salida</option></select><br>
  Cantidad: <input type="number" id="cantidad" value="1"><br>
  OT: <input type="text" id="ot"><br>
  Comentario: <input type="text" id="comentario"><br>
  Usuario: <input type="text" id="usuario_id" placeholder="op01"><br>
  <button onclick="registrarMovimiento()">Registrar</button>
</div>

<div id="resultado"></div>

<h2>Dashboard de Stock</h2>
<div id="dashboard">
  <button onclick="cargarDashboard()">Actualizar</button>
  <table id="tablaDashboard"><tr><th>Código</th><th>Nombre</th><th>Stock Actual</th><th>Alerta</th></tr></table>
</div>

<script>
const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT";
let ultimoCodigo="";

function onScanSuccess(decodedText){
  ultimoCodigo = decodedText;
  document.getElementById("formulario").style.display="block";
  document.getElementById("resultado").innerText = "Código escaneado: " + decodedText;
}

var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
html5QrcodeScanner.render(onScanSuccess);

function registrarMovimiento(){
  fetch(`${SCRIPT_URL}?codigo=${ultimoCodigo}&tipo=${document.getElementById("tipo").value}&cantidad=${document.getElementById("cantidad").value}&usuario_id=${document.getElementById("usuario_id").value}&orden_trabajo=${document.getElementById("ot").value}&comentario=${document.getElementById("comentario").value}`)
  .then(res=>res.json())
  .then(data=>{
    if(data.error) document.getElementById("resultado").innerText = data.error;
    else document.getElementById("resultado").innerText=`Recambio: ${data.nombre}\nStock actual: ${data.stock_actual}\nAlerta: ${data.alerta}`;
    document.getElementById("formulario").style.display="none";
    cargarDashboard();
  })
  .catch(err=>alert("Error: "+err));
}

function cargarDashboard(){
  fetch(`${SCRIPT_URL}?dashboard=true`)
  .then(res=>res.json())
  .then(data=>{
    const tabla = document.getElementById("tablaDashboard");
    tabla.innerHTML="<tr><th>Código</th><th>Nombre</th><th>Stock Actual</th><th>Alerta</th></tr>";
    data.forEach(r=>{
      let fila = tabla.insertRow();
      fila.insertCell(0).innerText=r.codigo;
      fila.insertCell(1).innerText=r.nombre;
      fila.insertCell(2).innerText=r.stock_actual;
      fila.insertCell(3).innerText=r.alerta;
    });
  });
}
</script>
</body>
</html>
