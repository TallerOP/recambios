<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; font-family:system-ui; background:#0f172a; color:white; }
.container { max-width:500px; margin:auto; padding:16px; }
.card { background:#1e293b; padding:16px; border-radius:12px; margin-bottom:12px; }
button { width:100%; padding:16px; font-size:18px; margin-top:10px; border:none; border-radius:10px; }
.in { background:#22c55e; }
.out { background:#ef4444; }
#reader { width:100%; border-radius:10px; overflow:hidden; }
</style>
</head>

<body>

<div class="container">

<h2>📦 Inventario</h2>

<div class="card">
  <label>Usuario</label>
  <select id="usuario"></select>
</div>

<div class="card">
  <div id="reader"></div>
</div>

<div class="card" id="producto" style="display:none;">
  <h3 id="nombre"></h3>
  <p id="stock"></p>

  <button class="in" onclick="mov('IN')">➕ Entrada</button>
  <button class="out" onclick="mov('OUT')">➖ Salida</button>
</div>

<div id="status"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx6g5BnZwlJfQC9ccG4jWETZAmlyMQ_WRsrLOToKU5y2SsN1mhRKb4HPMLQOqIR4tPE/exec";
const TOKEN = "MI_TOKEN";

let current = null;
let scanning = true;

// =================
// USUARIOS
// =================
const users = ["Operario1","Operario2","Supervisor"];
const sel = document.getElementById("usuario");

users.forEach(u=>{
  let o=document.createElement("option");
  o.value=u; o.textContent=u;
  sel.appendChild(o);
});

const saved = localStorage.getItem("user");
if(saved) sel.value = saved;

sel.onchange = ()=>localStorage.setItem("user", sel.value);

// =================
// ESCÁNER
// =================
function onScanSuccess(code) {
  if (!scanning) return;

  scanning = false;
  buscarProducto(code);
}

const scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  );
});

// =================
// API
// =================
async function buscarProducto(code){
  setStatus("Buscando...");

  try {
    const res = await fetch(`${API}?action=producto&id=${code}&token=${TOKEN}`);
    const data = await res.json();

    if(!data.ok) throw new Error(data.error);

    current = data.data;

    nombre.textContent = current.nombre;
    stock.textContent = "Stock: " + current.stock;

    producto.style.display = "block";

    ok("Producto detectado");

  } catch(err) {
    fail(err.message);
    scanning = true;
  }
}

// =================
// MOVIMIENTO
// =================
async function mov(tipo){
  if(!current) return;

  const cantidad = parseInt(prompt("Cantidad",1));
  if(!cantidad) return;

  setStatus("Enviando...");

  try {
    const res = await fetch(API,{
      method:"POST",
      headers:{ "Content-Type":"text/plain" },
      body: JSON.stringify({
        token:TOKEN,
        action:"movimiento",
        producto_id: current.id,
        tipo,
        cantidad,
        usuario: sel.value
      })
    });

    const data = await res.json();

    if(!data.ok) throw new Error(data.error);

    stock.textContent = "Stock: " + data.data.stock;

    ok("OK ✔");

    // volver a escanear automáticamente
    current = null;
    producto.style.display = "none";
    scanning = true;

  } catch(err){
    fail(err.message);
  }
}

// =================
// UX
// =================
function setStatus(msg){ status.innerText = msg; }
function ok(msg){ status.innerText = msg; status.style.color="lime"; beep(); }
function fail(msg){ status.innerText = msg; status.style.color="red"; vibrate(); }

function beep(){
  try{
    const ctx=new AudioContext();
    const osc=ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.1);
  }catch{}
}

function vibrate(){
  if(navigator.vibrate) navigator.vibrate(200);
}
</script>

</body>
</html>
